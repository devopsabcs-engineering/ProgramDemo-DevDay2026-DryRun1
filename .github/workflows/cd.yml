name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: dev
  INSTANCE: "125"
  RESOURCE_GROUP: rg-dev-125
  BACKEND_APP_NAME: app-backend-dev-125
  FRONTEND_APP_NAME: app-frontend-dev-125
  SQL_SERVER_NAME: sql-dev-125
  SQL_DATABASE_NAME: sqldb-dev-125

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven (skip tests — already validated in CI)
        run: |
          chmod +x ./mvnw
          ./mvnw -B package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend/target/*.jar

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend/dist

  deploy-database:
    name: Deploy Database Migrations
    runs-on: ubuntu-latest
    needs: [build-backend]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Flyway migrations
        uses: azure/sql-action@v2.3
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: database/migrations
          action: script

  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    needs: [build-backend, deploy-database]
    environment: dev
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: backend-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          package: backend-artifact

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend]
    environment: dev
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: frontend-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          package: frontend-artifact

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    environment: dev
    steps:
      - name: Health check — Backend API
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i — status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Backend health check failed after 5 attempts"
          exit 1

      - name: Health check — Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://${{ env.FRONTEND_APP_NAME }}.azurewebsites.net/")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend health check passed"
          else
            echo "Frontend health check failed with status $STATUS"
            exit 1
          fi
